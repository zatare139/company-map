<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Public Companies Near Me</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { position: absolute; inset: 0; }
  #panel {
    position: absolute; z-index: 1000; top: 12px; left: 12px;
    background: #fff; padding: 14px 16px; border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25); width: 260px;
    max-height: calc(100vh - 24px); overflow-y: auto;
  }
  #panel h1 { font-size: 15px; margin: 0 0 8px; }
  #panel label { font-size: 13px; display:block; margin-top: 8px; }
  #exchanges { margin-top: 8px; }
  #exchanges label { display: inline-block; margin: 2px 10px 0 0; font-size: 12px; }
  #exchanges input { vertical-align: middle; }
  #mcap { margin-top: 4px; }
  #mcap label { display: inline-block; margin: 2px 10px 0 0; font-size: 12px; }
  #mcap input { vertical-align: middle; }
  #industry { margin-top: 4px; }
  #industry label { display: inline-block; margin: 2px 10px 0 0; font-size: 12px; }
  #industry input { vertical-align: middle; }
  .toggleAll { font-size: 11px; color: #2563eb; cursor: pointer; margin-left: 6px; }
  .toggleAll:hover { text-decoration: underline; }
  #unkRow { font-size: 12px; }
  #unkRow input { vertical-align: middle; }
  #radiusVal { font-weight: 600; }
  #count { margin-top: 10px; font-size: 13px; }
  #count b { font-size: 18px; }
  button { margin-top: 10px; width: 100%; padding: 7px; border: 0;
    background: #2563eb; color: #fff; border-radius: 7px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1d4ed8; }
  .hint { font-size: 11px; color: #666; margin-top: 8px; line-height: 1.4; }
  input[type=range] { width: 100%; }
  #addrRow { display: flex; gap: 6px; margin-top: 4px; }
  #address { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; min-width: 0; }
  #addrRow button { margin-top: 0; width: auto; padding: 6px 12px; }
  #locate { background: #fff; color: #2563eb; border: 1px solid #2563eb; }
  #locate:hover { background: #eff6ff; }
  #checkedRow { font-size: 12px; margin-top: 8px; }
  #checkedRow input { vertical-align: middle; }
  #checkedCount { font-weight: 600; }
  #clearChecked { width: auto; margin-top: 6px; padding: 3px 8px; font-size: 11px;
    background: #fff; color: #b91c1c; border: 1px solid #b91c1c; }
  #clearChecked:hover { background: #fef2f2; }
  .chk { margin-top: 8px; width: 100%; padding: 6px; border: 1px solid #7c3aed;
    background: #fff; color: #7c3aed; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .chk:hover { background: #f5f3ff; }
  .chk.on { background: #7c3aed; color: #fff; border-color: #6d28d9; }
  .chk.on:hover { background: #6d28d9; }
  .chk.grn { border-color: #16a34a; color: #16a34a; }
  .chk.grn:hover { background: #f0fdf4; }
  .chk.grn.on { background: #16a34a; color: #fff; border-color: #15803d; }
  .chk.grn.on:hover { background: #15803d; }
  #popBtns { display: flex; gap: 6px; }
  #popBtns .chk { flex: 1; }
  #popNoteText { width: 100%; box-sizing: border-box; height: 220px; padding: 8px;
    border: 1px solid #ccc; border-radius: 6px; font: 13px/1.5 system-ui, sans-serif; resize: vertical; }
  #syncRow { margin-top: 8px; font-size: 11px; color: #666; }
  #companySearch { width: 100%; box-sizing: border-box; padding: 6px 8px;
    border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  #searchResults { border: 1px solid #e5e7eb; border-radius: 6px; margin-top: 4px;
    max-height: 240px; overflow-y: auto; }
  #searchResults div { padding: 6px 8px; font-size: 12px; cursor: pointer;
    border-top: 1px solid #f0f0f0; }
  #searchResults div:first-child { border-top: 0; }
  #searchResults div:hover, #searchResults div.active { background: #eff6ff; }
  #searchResults .tk { font-weight: 600; color: #2563eb; }
  #searchResults .meta { color: #666; }
  .hidden { display: none; }
  #panel h1 { padding-right: 28px; }
  #hidePanel { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px;
    margin: 0; padding: 0; background: #fff; color: #666; border: 1px solid #ddd;
    border-radius: 6px; font-size: 15px; line-height: 1; cursor: pointer; }
  #hidePanel:hover { background: #f3f4f6; color: #111; }
  #showPanel { position: absolute; z-index: 1000; top: 12px; left: 12px; width: auto;
    margin: 0; padding: 8px 12px; background: #2563eb; color: #fff; border: 0;
    border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.25); cursor: pointer; font-size: 13px; }
  #showPanel:hover { background: #1d4ed8; }
  /* --- Company detail popup (tabbed, anchored to the pin) --- */
  .companyPop .leaflet-popup-content { margin: 0; width: min(380px, calc(100vw - 60px)) !important; }
  .companyPop .leaflet-popup-content-wrapper { border-radius: 10px; }
  #popHead { padding: 12px 14px 8px; border-bottom: 1px solid #eee; }
  #popHead h2 { margin: 0 0 2px; font-size: 16px; padding-right: 14px; }
  #popMeta { font-size: 12px; color: #555; line-height: 1.5; }
  #popSite { display: inline-block; margin-top: 6px; font-size: 12px; font-weight: 600;
    color: #2563eb; text-decoration: none; }
  #popSite:hover { text-decoration: underline; }
  #popTabs { display: flex; border-bottom: 1px solid #e5e7eb; }
  #popTabs button { flex: 1; margin: 0; padding: 8px 4px; background: #fff; color: #555; border: 0;
    border-bottom: 2px solid transparent; border-radius: 0; font-size: 13px; cursor: pointer; }
  #popTabs button:hover { background: #f8fafc; }
  #popTabs button.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
  .popPane { display: none; height: 300px; overflow-y: auto; padding: 10px 12px; }
  .popPane.active { display: block; }
  .tvBox { margin-bottom: 12px; }
  #contactList { font-size: 14px; line-height: 1.7; }
  #contactList a { color: #2563eb; }
  .irscan { font-size: 12.5px; line-height: 1.5; color: #1f2937; }
  .irscan h3 { font-size: 13px; margin: 14px 0 5px; color: #111; border-bottom: 1px solid #eee; padding-bottom: 3px; }
  .irscan h3:first-child { margin-top: 0; }
  .irscan p { margin: 5px 0; }
  .irscan ul { margin: 5px 0; padding-left: 18px; }
  .irscan li { margin: 3px 0; }
  .irscan table { width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 11.5px; }
  .irscan th, .irscan td { text-align: left; padding: 3px 5px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  .irscan th { color: #666; font-weight: 600; }
  .irscan td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .irscan .pos { color: #1F7A3E; }
  .irscan .neg { color: #B33D2E; }
  .irscan .rate { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
    background: #eef2ff; color: #3730a3; margin-left: 4px; }
  .irscan .flag { color: #b45309; }
  .irscan .muted { color: #888; font-style: italic; }
  .irscan .scanFoot { margin-top: 12px; padding-top: 8px; border-top: 1px solid #eee; font-size: 10.5px; color: #999; }
  .irNone { padding: 6px 2px; }
  #dirBtns { display: flex; gap: 8px; margin-top: 10px; }
  .mapsBtn { flex: 1; text-align: center; padding: 8px 12px; background: #2563eb; color: #fff !important;
    border-radius: 7px; text-decoration: none; font-size: 13px; }
  .mapsBtn:hover { background: #1d4ed8; }
  .mapsBtn.apple { background: #111; }
  .mapsBtn.apple:hover { background: #333; }
  /* Cluster bubbles: yellow -> orange as they grow (default green palette overridden) */
  .marker-cluster-small { background-color: rgba(253, 224, 71, .6); }
  .marker-cluster-small div { background-color: rgba(250, 204, 21, .75); }
  .marker-cluster-medium { background-color: rgba(251, 191, 36, .6); }
  .marker-cluster-medium div { background-color: rgba(245, 158, 11, .75); }
  .marker-cluster-large { background-color: rgba(251, 146, 60, .6); }
  .marker-cluster-large div { background-color: rgba(249, 115, 22, .8); }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <button id="hidePanel" title="Hide panel">&#10005;</button>
  <h1>Public companies near me</h1>
  <label for="companySearch">Find a company by name or ticker</label>
  <div id="searchWrap">
    <input type="text" id="companySearch" placeholder="e.g. NVDA or Nvidia" autocomplete="off" />
    <div id="searchResults" class="hidden"></div>
  </div>
  <label for="address">Address, city, or ZIP</label>
  <div id="addrRow">
    <input type="text" id="address" placeholder="e.g. 1600 Amphitheatre Pkwy, CA" />
    <button id="search">Go</button>
  </div>
  <label>Radius: <span id="radiusVal">200</span> miles</label>
  <input type="range" id="radius" min="1" max="200" value="200" />
  <div id="exchanges">
    <label><input type="checkbox" class="ex" value="NYSE" checked> NYSE</label>
    <label><input type="checkbox" class="ex" value="Nasdaq" checked> Nasdaq</label>
    <label><input type="checkbox" class="ex" value="OTC" checked> OTC</label>
    <label><input type="checkbox" class="ex" value="other" checked> Other</label>
  </div>
  <label>Market cap</label>
  <div id="mcap">
    <label><input type="checkbox" class="cap" value="u50" checked> Under $50M</label>
    <label><input type="checkbox" class="cap" value="50_300" checked> $50M&ndash;$300M</label>
    <label><input type="checkbox" class="cap" value="300_1b" checked> $300M&ndash;$1B</label>
    <label><input type="checkbox" class="cap" value="1b_2b" checked> $1B&ndash;$2B</label>
    <label><input type="checkbox" class="cap" value="2b_5b" checked> $2B&ndash;$5B</label>
    <label><input type="checkbox" class="cap" value="5b_10b" checked> $5B&ndash;$10B</label>
    <label><input type="checkbox" class="cap" value="10b" checked> $10B+</label>
  </div>
  <label id="unkRow"><input type="checkbox" id="includeUnknown" checked> Include companies with no cap data</label>
  <label>Industry <span class="toggleAll" id="indAll">all</span><span class="toggleAll" id="indNone">none</span></label>
  <div id="industry">
    <label><input type="checkbox" class="ind" value="Technology" checked> Technology</label>
    <label><input type="checkbox" class="ind" value="Healthcare & Biotech" checked> Healthcare &amp; Biotech</label>
    <label><input type="checkbox" class="ind" value="Financials" checked> Financials</label>
    <label><input type="checkbox" class="ind" value="Real Estate / REITs" checked> Real Estate / REITs</label>
    <label><input type="checkbox" class="ind" value="Energy" checked> Energy</label>
    <label><input type="checkbox" class="ind" value="Industrials & Manufacturing" checked> Industrials &amp; Mfg</label>
    <label><input type="checkbox" class="ind" value="Materials & Mining" checked> Materials &amp; Mining</label>
    <label><input type="checkbox" class="ind" value="Consumer" checked> Consumer</label>
    <label><input type="checkbox" class="ind" value="Media & Telecom" checked> Media &amp; Telecom</label>
    <label><input type="checkbox" class="ind" value="Utilities" checked> Utilities</label>
    <label><input type="checkbox" class="ind" value="Transportation & Logistics" checked> Transport &amp; Logistics</label>
    <label><input type="checkbox" class="ind" value="Other / Shell / Diversified" checked> Other / Shell</label>
  </div>
  <label id="indUnkRow" style="font-size:12px"><input type="checkbox" id="includeUnknownInd" checked> Include companies with no industry data</label>
  <label id="checkedRow"><input type="checkbox" id="hideChecked"> Hide ones I've looked into (<span id="checkedCount">0</span> marked)</label>
  <button id="clearChecked">Reset my checkmarks</button>
  <button id="locate">Use my location</button>
  <div id="count">Loading company data…</div>
  <div id="syncRow"><span class="toggleAll" id="syncSetup">Set up sync</span> <span id="syncStatus"></span></div>
  <div class="hint">Pins: blue = not visited &middot; purple = looked into &middot; green = revisit.
    Type an address and press Go, click "Use my location", or click anywhere on the map to set your center point.</div>
</div>
<button id="showPanel" class="hidden" title="Show panel">&#9776; Panel</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="data/companies.js"></script>
<script>
const MILES_PER_KM = 0.621371;
let companies = [];
let center = null;            // {lat, lon}
let circle = null;
let markerLayer = L.markerClusterGroup({
  chunkedLoading: true,
  spiderfyOnMaxZoom: false,      // never fan pins out in a circle — keep true positions
  disableClusteringAtZoom: 15,   // street level: every pin at its exact spot, overlaps allowed
  maxClusterRadius: 50           // cluster less aggressively while zooming in
});

// --- Per-company status + notes (persisted in this browser, synced via Google Sheet) ---
// statusMap: id -> { s: ''|'done'|'revisit', n: notes, u: last-edit epoch ms }
const idOf = c => (c.ticker ? 'T:' + c.ticker : 'N:' + c.name);
let statusMap = {};
try { statusMap = JSON.parse(localStorage.getItem('companyStatus') || 'null') || {}; } catch (e) {}
// migrate the old boolean checkmark store
try {
  const old = JSON.parse(localStorage.getItem('checkedCompanies') || '[]');
  for (const id of old) if (!statusMap[id]) statusMap[id] = { s: 'done', n: '', u: 0 };
} catch (e) {}
const markerByIdx = {};   // company index -> marker, rebuilt each render
function saveStatus() { localStorage.setItem('companyStatus', JSON.stringify(statusMap)); }
const statusOf = c => (statusMap[idOf(c)] || {}).s || '';
const noteOf = c => (statusMap[idOf(c)] || {}).n || '';
function statusRec(c) {
  const id = idOf(c);
  return statusMap[id] || (statusMap[id] = { s: '', n: '', u: 0 });
}
function updateCheckedCount() {
  const vals = Object.values(statusMap);
  document.getElementById('checkedCount').textContent = vals.filter(v => v.s === 'done').length;
}

// --- Sync bridge (Google Apps Script -> Google Sheet). Config lives per device. ---
let syncCfg = null;
try { syncCfg = JSON.parse(localStorage.getItem('syncConfig') || 'null'); } catch (e) {}
const syncQueue = new Set();
let syncTimer = null;

function setSyncStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = msg;
}

function queueSync(id) {
  if (!syncCfg) return;
  syncQueue.add(id);
  clearTimeout(syncTimer);
  syncTimer = setTimeout(flushSync, 800);
}

async function flushSync() {
  if (!syncCfg || !syncQueue.size) return;
  const ids = [...syncQueue];
  syncQueue.clear();
  const byId = {};
  companies.forEach(c => { byId[idOf(c)] = c; });
  for (const id of ids) {
    const rec = statusMap[id] || { s: '', n: '', u: Date.now() };
    const c = byId[id] || {};
    try {
      // text/plain avoids a CORS preflight that Apps Script can't answer
      await fetch(syncCfg.url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ token: syncCfg.token, key: id, ticker: c.ticker || '',
          company: c.name || '', status: rec.s, notes: rec.n, updated: rec.u })
      });
      setSyncStatus('Synced ' + new Date().toLocaleTimeString());
    } catch (e) {
      syncQueue.add(id);            // retry on next change
      setSyncStatus('Sync failed — will retry');
    }
  }
}

let lastPull = 0;
async function syncPull() {
  if (!syncCfg) return;
  lastPull = Date.now();
  setSyncStatus('Syncing…');
  try {
    const r = await fetch(syncCfg.url + '?token=' + encodeURIComponent(syncCfg.token));
    const data = await r.json();
    if (!data.ok) { setSyncStatus('Sync error: ' + (data.error || '?')); return; }
    let pulled = 0;
    for (const row of data.rows) {
      const local = statusMap[row.key];
      const remoteU = +row.updated || 0;
      if (!local || remoteU > (local.u || 0)) {
        statusMap[row.key] = { s: row.status || (row.lookedInto ? 'done' : ''), n: row.notes || '', u: remoteU };
        pulled++;
      } else if ((local.u || 0) > remoteU && (local.s || local.n)) {
        queueSync(row.key);         // this device has the newer edit — push it
      }
    }
    // push local records the sheet has never seen
    const seen = new Set(data.rows.map(r2 => r2.key));
    for (const id in statusMap) {
      if (!seen.has(id) && (statusMap[id].s || statusMap[id].n)) queueSync(id);
    }
    saveStatus();
    updateCheckedCount();
    render();
    setSyncStatus('Synced ' + new Date().toLocaleTimeString() + (pulled ? ` (${pulled} pulled)` : ''));
  } catch (e) {
    setSyncStatus('Sync unreachable — working offline');
  }
}

// Coming back to the tab (e.g. opening the phone after edits on the laptop) re-pulls.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && syncCfg && Date.now() - lastPull > 60000) syncPull();
});

// One-click device setup: open  <map-url>#sync=<exec-url>|<token>  once and the
// config is stored, then scrubbed from the address bar (the hash never reaches any server).
(function hashSetup() {
  const m = location.hash.match(/^#sync=([^|]+)\|(.+)$/);
  if (!m) return;
  syncCfg = { url: decodeURIComponent(m[1]), token: decodeURIComponent(m[2]) };
  localStorage.setItem('syncConfig', JSON.stringify(syncCfg));
  history.replaceState(null, '', location.pathname + location.search);
})();

function setupSync() {
  const url = prompt('Paste your Apps Script web app URL (ends in /exec):',
    (syncCfg && syncCfg.url) || '');
  if (!url) return;
  const token = prompt('Paste your sync token:', (syncCfg && syncCfg.token) || '');
  if (!token) return;
  syncCfg = { url: url.trim(), token: token.trim() };
  localStorage.setItem('syncConfig', JSON.stringify(syncCfg));
  syncPull();
}

const blueIcon = new L.Icon.Default();
const visitedIcon = new L.Icon({
  iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-2x-violet.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});
const revisitIcon = new L.Icon({
  iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-2x-green.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});
const iconFor = c => ({ done: visitedIcon, revisit: revisitIcon }[statusOf(c)] || blueIcon);
const redIcon = new L.Icon({
  iconUrl: 'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-2x-red.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});

function setStatus(c, s) {
  const rec = statusRec(c);
  rec.s = (rec.s === s) ? '' : s;   // clicking the active status clears it
  rec.u = Date.now();
  saveStatus();
  updateCheckedCount();
  queueSync(idOf(c));
  const m = markerByIdx[c._i];
  if (m) m.setIcon(iconFor(c));
  if (popCompany && popCompany._i === c._i) popStatusBtns();
  render();   // refresh counts (and drop the marker if "hide looked into" is on)
}

function setNote(c, text) {
  const rec = statusRec(c);
  if (rec.n === text) return;
  rec.n = text;
  rec.u = Date.now();
  saveStatus();
  queueSync(idOf(c));
}

// --- Company detail popup (Overview / Performance / Contacts), anchored to the pin ---
let popCompany = null;
const tvLoaded = { overview: false, perf: false, irscan: false };
// Tickers that have a committed advisory-fit scan (scans/index.json). Loaded once.
let scannedTickers = new Set();
fetch('scans/index.json', { cache: 'no-store' })
  .then(r => r.ok ? r.json() : [])
  .then(list => { scannedTickers = new Set((list || []).map(t => String(t).toUpperCase())); })
  .catch(() => {});
const companyPopup = L.popup({ maxWidth: 420, className: 'companyPop', autoPanPadding: L.point(40, 40) });

// Link to the company's own site via a Google search — the official site is
// reliably the top result, so no 16k URLs to store or maintain. Name is lightly
// cleaned; ticker disambiguates. (DDG's "jump to first result" trick was
// unreliable — it opened a blank page — so we use a plain, always-working search.)
function companyUrl(c) {
  const name = (c.name || '').replace(/,?\s+(Inc\.?|Corp\.?|Corporation|Ltd\.?|Limited|LLC|PLC|Co\.?|Holdings?|Group|N\.V\.|S\.A\.)$/i, '').trim();
  const q = [name || c.name, c.ticker, 'official website'].filter(Boolean).join(' ');
  return 'https://www.google.com/search?q=' + encodeURIComponent(q);
}

// TradingView wants exchange-qualified symbols where we know the venue.
function tvSymbol(c) {
  const pre = { NYSE: 'NYSE', Nasdaq: 'NASDAQ', OTC: 'OTC' }[c.exchange];
  return pre ? pre + ':' + c.ticker : c.ticker;
}

function tvWidget(container, script, config) {
  const box = document.createElement('div');
  box.className = 'tvBox';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container';
  box.appendChild(inner);
  const s = document.createElement('script');
  s.type = 'text/javascript';
  s.async = true;
  s.src = 'https://s3.tradingview.com/external-embedding/' + script;
  s.text = JSON.stringify(config);
  inner.appendChild(s);
  container.appendChild(box);
}

function popStatusBtns() {
  const s = statusOf(popCompany);
  const done = document.getElementById('popDone');
  const rev = document.getElementById('popRevisit');
  if (!done || !rev) return;
  done.className = 'chk ' + (s === 'done' ? 'on' : '');
  done.textContent = s === 'done' ? '✓ Looked into' : 'Mark as looked into';
  rev.className = 'chk grn ' + (s === 'revisit' ? 'on' : '');
  rev.textContent = s === 'revisit' ? '↻ Revisit planned' : 'Visited — revisit later';
}

function buildContacts(c) {
  const street = c.addr || '';
  const cityLine = `${c.city}, ${c.state}${c.zip ? ' ' + c.zip : ''}`;
  const full = street ? `${street}, ${cityLine}` : `${c.name}, ${cityLine}`;
  const phoneHtml = c.phone
    ? `<b>Phone:</b> <a href="tel:${String(c.phone).replace(/[^+\d]/g, '')}">${c.phone}</a>`
    : `<b>Phone:</b> <span style="color:#888">not in SEC filings</span>`;
  const dest = encodeURIComponent(full);
  document.getElementById('pop-contacts').innerHTML =
    `<div id="contactList">${phoneHtml}<br>` +
    `<b>HQ address:</b><br>${street ? street + '<br>' : ''}${cityLine}` +
    `<div id="dirBtns">` +
    `<a class="mapsBtn" target="_blank" rel="noopener" ` +
    `href="https://www.google.com/maps/dir/?api=1&destination=${dest}">&#128663; Google Maps</a>` +
    `<a class="mapsBtn apple" target="_blank" rel="noopener" ` +
    `href="https://maps.apple.com/?daddr=${dest}&dirflg=d">&#63743; Apple Maps</a>` +
    `</div></div>` +
    (street ? '' : `<div class="hint">Street address not found in SEC data for this company.</div>`);
}

function switchTab(name) {
  document.querySelectorAll('#popTabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.popPane').forEach(p =>
    p.classList.toggle('active', p.id === 'pop-' + name));
  const c = popCompany;
  if (!c) return;
  // TradingView widgets load lazily, once per company per tab
  if (name === 'overview' && !tvLoaded.overview) {
    tvLoaded.overview = true;
    tvWidget(document.getElementById('pop-overview'), 'embed-widget-symbol-profile.js',
      { symbol: tvSymbol(c), width: '100%', height: 420, isTransparent: true, colorTheme: 'light', locale: 'en' });
  }
  if (name === 'perf' && !tvLoaded.perf) {
    tvLoaded.perf = true;
    const pane = document.getElementById('pop-perf');
    tvWidget(pane, 'embed-widget-symbol-info.js',
      { symbol: tvSymbol(c), width: '100%', isTransparent: true, colorTheme: 'light', locale: 'en' });
    tvWidget(pane, 'embed-widget-symbol-overview.js', {
      symbols: [[c.name, tvSymbol(c) + '|12M']],
      chartOnly: true, width: '100%', height: 300, colorTheme: 'light', isTransparent: true,
      locale: 'en', showVolume: false, scalePosition: 'right', valuesTracking: '1',
      dateRanges: ['12m|1D', '60m|1W', 'all|1M']
    });
    tvWidget(pane, 'embed-widget-financials.js',
      { symbol: tvSymbol(c), width: '100%', height: 440, displayMode: 'regular',
        isTransparent: true, colorTheme: 'light', locale: 'en' });
  }
  if (name === 'irscan' && !tvLoaded.irscan) {
    tvLoaded.irscan = true;
    loadIrScan(c);
  }
}

// IR scans are pre-generated advisory-fit scans committed under scans/<TICKER>.html.
// Fetch lazily; show a friendly placeholder when a company hasn't been scanned yet.
function loadIrScan(c) {
  const pane = document.getElementById('pop-irscan');
  if (!c.ticker) { pane.innerHTML = `<div class="hint">No ticker — IR scans are keyed by ticker.</div>`; return; }
  pane.innerHTML = `<div class="hint">Loading IR scan…</div>`;
  fetch('scans/' + encodeURIComponent(c.ticker.toUpperCase()) + '.html', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error('nofile'); return r.text(); })
    .then(html => { pane.innerHTML = `<div class="irscan">${html}</div>`; })
    .catch(() => {
      pane.innerHTML =
        `<div class="irNone"><b>No IR scan yet for ${c.ticker}.</b>` +
        `<div class="hint">Advisory-fit scans are generated on request. Ask Claude to “scan ${c.ticker}” ` +
        `and it’ll appear here after the next deploy.</div></div>`;
    });
}

function openCompanyPopup(c, at) {
  popCompany = c;
  tvLoaded.overview = tvLoaded.perf = tvLoaded.irscan = false;
  const el = document.createElement('div');
  el.innerHTML =
    `<div id="popHead"><h2 id="popName"></h2><div id="popMeta"></div>` +
    `<a id="popSite" target="_blank" rel="noopener">&#127760; Find company website &#8599;</a>` +
    `<div id="popBtns"><button class="chk" id="popDone"></button>` +
    `<button class="chk grn" id="popRevisit"></button></div></div>` +
    `<div id="popTabs">` +
    `<button data-tab="overview" class="active">Overview</button>` +
    `<button data-tab="perf">Chart</button>` +
    `<button data-tab="irscan" id="popIrTab">IR Scan</button>` +
    `<button data-tab="contacts">Contacts</button>` +
    `<button data-tab="notes" id="popNotesTab">Notes</button></div>` +
    `<div class="popPane active" id="pop-overview"></div>` +
    `<div class="popPane" id="pop-perf"></div>` +
    `<div class="popPane" id="pop-irscan"></div>` +
    `<div class="popPane" id="pop-contacts"></div>` +
    `<div class="popPane" id="pop-notes">` +
    `<textarea id="popNoteText" placeholder="Notes from your visit — who you talked to, follow-ups, impressions…"></textarea>` +
    `<div class="hint" id="noteHint">Saved automatically.</div></div>`;
  companyPopup.setLatLng(at || [c.lat, c.lon]).setContent(el).openOn(map);
  document.getElementById('popName').textContent = c.name;
  const bits = [];
  if (c.ticker) bits.push(c.ticker);
  if (c.sector) bits.push(c.sector);
  if (c.mcap != null) bits.push(fmtCap(c.mcap) + ' mkt cap');
  if (center) bits.push(haversineMiles(center.lat, center.lon, c.lat, c.lon).toFixed(1) + ' mi away');
  document.getElementById('popMeta').textContent = bits.join(' · ');
  document.getElementById('popSite').href = companyUrl(c);
  popStatusBtns();
  if (c.ticker && scannedTickers.has(c.ticker.toUpperCase())) {
    document.getElementById('popIrTab').textContent = 'IR Scan ●';
  }
  buildContacts(c);
  const ta = document.getElementById('popNoteText');
  ta.value = noteOf(c);
  markNotesTab();
  let noteTimer = null;
  ta.addEventListener('input', () => {
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => { setNote(c, ta.value.trim()); markNotesTab(); }, 500);
  });
  el.querySelectorAll('#popTabs button').forEach(b =>
    b.addEventListener('click', () => switchTab(b.dataset.tab)));
  document.getElementById('popDone').addEventListener('click', () => setStatus(c, 'done'));
  document.getElementById('popRevisit').addEventListener('click', () => setStatus(c, 'revisit'));
  switchTab('overview');
}

function markNotesTab() {
  const t = document.getElementById('popNotesTab');
  if (t && popCompany) t.textContent = noteOf(popCompany) ? 'Notes ●' : 'Notes';
}

// --- Session state (map view, center, radius, filters) persisted in this browser ---
let SAVED = null;
try { SAVED = JSON.parse(localStorage.getItem('mapState') || 'null'); } catch (e) {}

const map = (SAVED && SAVED.view)
  ? L.map('map').setView([SAVED.view.lat, SAVED.view.lon], SAVED.view.zoom)
  : L.map('map').setView([39.5, -98.35], 4); // continental US default

function saveState() {
  const v = map.getCenter();
  const st = {
    view: { lat: v.lat, lon: v.lng, zoom: map.getZoom() },
    center,
    radius: +document.getElementById('radius').value,
    ex: [...document.querySelectorAll('.ex:checked')].map(e => e.value),
    cap: [...document.querySelectorAll('.cap:checked')].map(e => e.value),
    ind: [...document.querySelectorAll('.ind:checked')].map(e => e.value),
    incUnk: document.getElementById('includeUnknown').checked,
    incUnkInd: document.getElementById('includeUnknownInd').checked,
    hideChecked: document.getElementById('hideChecked').checked,
  };
  try { localStorage.setItem('mapState', JSON.stringify(st)); } catch (e) {}
}

function restoreState() {
  if (!SAVED) return;
  if (SAVED.radius != null) document.getElementById('radius').value = SAVED.radius;
  if (Array.isArray(SAVED.ex)) document.querySelectorAll('.ex').forEach(e => e.checked = SAVED.ex.includes(e.value));
  if (Array.isArray(SAVED.cap)) {
    // state saved before the 2B–10B bucket was split: it maps to both new buckets
    if (SAVED.cap.includes('2b_10b')) SAVED.cap.push('2b_5b', '5b_10b');
    document.querySelectorAll('.cap').forEach(e => e.checked = SAVED.cap.includes(e.value));
  }
  if (Array.isArray(SAVED.ind)) document.querySelectorAll('.ind').forEach(e => e.checked = SAVED.ind.includes(e.value));
  if (typeof SAVED.incUnk === 'boolean') document.getElementById('includeUnknown').checked = SAVED.incUnk;
  if (typeof SAVED.incUnkInd === 'boolean') document.getElementById('includeUnknownInd').checked = SAVED.incUnkInd;
  if (typeof SAVED.hideChecked === 'boolean') document.getElementById('hideChecked').checked = SAVED.hideChecked;
  if (SAVED.center && typeof SAVED.center.lat === 'number') center = SAVED.center;
}
map.on('moveend', saveState);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap'
}).addTo(map);
markerLayer.addTo(map);

function haversineMiles(aLat, aLon, bLat, bLon) {
  const R = 6371; // km
  const dLat = (bLat - aLat) * Math.PI / 180;
  const dLon = (bLon - aLon) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 +
    Math.cos(aLat*Math.PI/180) * Math.cos(bLat*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s)) * MILES_PER_KM;
}

function render() {
  const radius = +document.getElementById('radius').value;
  document.getElementById('radiusVal').textContent = radius;
  if (!center) {
    document.getElementById('count').innerHTML =
      `Set a location to search. <b>${companies.length}</b> companies loaded.`;
    saveState();
    return;
  }
  markerLayer.clearLayers();
  if (circle) map.removeLayer(circle);
  circle = L.circle([center.lat, center.lon], {
    radius: radius / MILES_PER_KM * 1000, color: '#2563eb', weight: 1, fillOpacity: 0.05
  }).addTo(map);

  const allowed = new Set(
    [...document.querySelectorAll('.ex:checked')].map(e => e.value)
  );
  const exOK = c => {
    const e = c.exchange;
    if (e === 'NYSE' || e === 'Nasdaq' || e === 'OTC') return allowed.has(e);
    return allowed.has('other'); // CBOE, blank, anything else
  };
  const capRanges = [...document.querySelectorAll('.cap:checked')].map(e => e.value);
  const includeUnknown = document.getElementById('includeUnknown').checked;
  const inBucket = (v, b) => {
    switch (b) {
      case 'u50':    return v < 50e6;
      case '50_300': return v >= 50e6 && v < 300e6;
      case '300_1b': return v >= 300e6 && v < 1e9;
      case '1b_2b':  return v >= 1e9 && v < 2e9;
      case '2b_5b':  return v >= 2e9 && v < 5e9;
      case '5b_10b': return v >= 5e9 && v < 10e9;
      case '10b':    return v >= 10e9;
    }
    return false;
  };
  const capOK = c => {
    if (c.mcap == null) return includeUnknown;
    return capRanges.some(b => inBucket(c.mcap, b));
  };
  const indAllowed = new Set([...document.querySelectorAll('.ind:checked')].map(e => e.value));
  const includeUnknownInd = document.getElementById('includeUnknownInd').checked;
  const indOK = c => {
    if (!c.sector) return includeUnknownInd;
    return indAllowed.has(c.sector);
  };
  const hideChecked = document.getElementById('hideChecked').checked;

  for (const k in markerByIdx) delete markerByIdx[k];
  const hits = [];
  for (const c of companies) {
    if (!exOK(c) || !capOK(c) || !indOK(c)) continue;
    if (hideChecked && statusOf(c) === 'done') continue;
    const d = haversineMiles(center.lat, center.lon, c.lat, c.lon);
    if (d <= radius) hits.push([d, c]);
  }
  hits.sort((a,b) => a[0]-b[0]);
  let nDone = 0, nRevisit = 0;
  // Companies without a geocoded street address sit on their ZIP centroid, so
  // several can share IDENTICAL coordinates. Fan such stacks out by a few meters
  // (deterministic ring) so every HQ stays visible and clickable when zoomed in.
  const stack = new Map();
  for (const [d, c] of hits) {
    const s = statusOf(c);
    if (s === 'done') nDone++;
    if (s === 'revisit') nRevisit++;
    const key = c.lat.toFixed(5) + ',' + c.lon.toFixed(5);
    const n = stack.get(key) || 0;
    stack.set(key, n + 1);
    let lat = c.lat, lon = c.lon;
    if (n > 0) {
      const ring = Math.ceil(n / 8), pos = (n - 1) % 8;
      const r = 0.00013 * ring, ang = pos * Math.PI / 4;
      lat += r * Math.cos(ang);
      lon += r * Math.sin(ang) / Math.cos(lat * Math.PI / 180);
    }
    const m = L.marker([lat, lon], { icon: iconFor(c) })
      .addTo(markerLayer);
    m.on('click', () => openCompanyPopup(c, m.getLatLng()));
    markerByIdx[c._i] = m;
  }
  const doneNote = nDone ? ` &middot; <span style="color:#7c3aed">${nDone} looked into</span>` : '';
  const revNote = nRevisit ? ` &middot; <span style="color:#16a34a">${nRevisit} to revisit</span>` : '';
  document.getElementById('count').innerHTML =
    `<b>${hits.length}</b> public companies within ${radius} mi${doneNote}${revNote}`;
  saveState();
}

function fmtCap(v) {
  if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  return '$' + v.toLocaleString();
}

function setCenter(lat, lon, zoom) {
  center = { lat, lon };
  if (zoom) map.setView([lat, lon], zoom);
  render();
}

function setCountMsg(msg) { document.getElementById('count').innerHTML = msg; }

async function geocode(query) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=us&q='
    + encodeURIComponent(query);
  const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await r.json();
  if (!data.length) return null;
  return { lat: +data[0].lat, lon: +data[0].lon };
}

async function doSearch() {
  const q = document.getElementById('address').value.trim();
  if (!q) { document.getElementById('address').focus(); return; }
  setCountMsg('Looking up address…');
  try {
    const loc = await geocode(q);
    if (!loc) { setCountMsg('Address not found. Try adding a city or state.'); return; }
    setCenter(loc.lat, loc.lon, 9);
  } catch (e) {
    setCountMsg('Address lookup failed (network/CORS). Click the map instead.');
  }
}

document.getElementById('radius').addEventListener('input', render);
document.querySelectorAll('.ex').forEach(e => e.addEventListener('change', render));
document.querySelectorAll('.cap').forEach(e => e.addEventListener('change', render));
document.getElementById('includeUnknown').addEventListener('change', render);
document.querySelectorAll('.ind').forEach(e => e.addEventListener('change', render));
document.getElementById('includeUnknownInd').addEventListener('change', render);
document.getElementById('indAll').addEventListener('click', () => {
  document.querySelectorAll('.ind').forEach(e => e.checked = true);
  document.getElementById('includeUnknownInd').checked = true;
  render();
});
document.getElementById('indNone').addEventListener('click', () => {
  document.querySelectorAll('.ind').forEach(e => e.checked = false);
  document.getElementById('includeUnknownInd').checked = false;
  render();
});
document.getElementById('hideChecked').addEventListener('change', render);
document.getElementById('clearChecked').addEventListener('click', () => {
  const n = Object.values(statusMap).filter(v => v.s).length;
  if (!n) return;
  if (!confirm(`Clear all ${n} status marks? Notes are kept. This also clears them from the synced sheet.`)) return;
  const now = Date.now();
  for (const id in statusMap) {
    if (statusMap[id].s) { statusMap[id].s = ''; statusMap[id].u = now; queueSync(id); }
  }
  saveStatus();
  updateCheckedCount();
  render();
});
map.on('click', e => setCenter(e.latlng.lat, e.latlng.lng));
document.getElementById('search').addEventListener('click', doSearch);
document.getElementById('address').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
document.getElementById('locate').addEventListener('click', () => {
  if (!navigator.geolocation) { setCountMsg('Geolocation unavailable. Type an address above.'); return; }
  if (!window.isSecureContext) {
    setCountMsg('Location needs https or localhost. Type an address above instead.');
    return;
  }
  setCountMsg('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    p => setCenter(p.coords.latitude, p.coords.longitude, 9),
    err => setCountMsg('Location blocked (' + err.message + '). Type an address above.')
  );
});

// --- Company search (by name or ticker) ---
let searchMarker = null;

function searchCompanies(q) {
  q = q.trim().toLowerCase();
  if (!q) return [];
  const res = [];
  for (const c of companies) {
    const tk = (c.ticker || '').toLowerCase();
    const nm = (c.name || '').toLowerCase();
    let score = -1;
    if (tk && tk === q) score = 0;            // exact ticker
    else if (tk && tk.startsWith(q)) score = 1; // ticker prefix
    else if (nm.startsWith(q)) score = 2;       // name prefix
    else if (tk && tk.includes(q)) score = 3;   // ticker contains
    else if (nm.includes(q)) score = 4;         // name contains
    if (score >= 0) res.push([score, c]);
  }
  // best match first, then biggest company as a tiebreaker
  res.sort((a, b) => a[0] - b[0] || (b[1].mcap || 0) - (a[1].mcap || 0));
  return res.slice(0, 8).map(r => r[1]);
}

function renderResults(list) {
  const box = document.getElementById('searchResults');
  if (!list.length) { box.classList.add('hidden'); box.innerHTML = ''; return; }
  box.innerHTML = list.map((c, i) =>
    `<div data-idx="${c._i}" class="${i === 0 ? 'active' : ''}">` +
    `<span class="tk">${c.ticker || '—'}</span> ${c.name} ` +
    `<span class="meta">&middot; ${c.city}, ${c.state}</span></div>`).join('');
  box.classList.remove('hidden');
}

function selectCompany(c) {
  if (searchMarker) map.removeLayer(searchMarker);
  searchMarker = L.marker([c.lat, c.lon], { icon: redIcon, zIndexOffset: 1000 })
    .addTo(map).on('click', () => openCompanyPopup(c));
  map.setView([c.lat, c.lon], 11);
  openCompanyPopup(c);
  document.getElementById('searchResults').classList.add('hidden');
}

const searchInput = document.getElementById('companySearch');
const resultsBox = document.getElementById('searchResults');
searchInput.addEventListener('input', () => renderResults(searchCompanies(searchInput.value)));
resultsBox.addEventListener('click', e => {
  const div = e.target.closest('div[data-idx]');
  if (!div) return;
  const c = companies[+div.dataset.idx];
  searchInput.value = c.name;
  selectCompany(c);
});
searchInput.addEventListener('keydown', e => {
  const items = [...resultsBox.querySelectorAll('div[data-idx]')];
  if (!items.length) return;
  let i = items.findIndex(d => d.classList.contains('active'));
  if (e.key === 'ArrowDown') { e.preventDefault(); i = Math.min(items.length - 1, i + 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); i = Math.max(0, i - 1); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = items[i < 0 ? 0 : i];
    if (sel) { const c = companies[+sel.dataset.idx]; searchInput.value = c.name; selectCompany(c); }
    return;
  } else return;
  items.forEach(d => d.classList.remove('active'));
  items[i].classList.add('active');
  items[i].scrollIntoView({ block: 'nearest' });
});
document.addEventListener('click', e => {
  if (!e.target.closest('#searchWrap')) resultsBox.classList.add('hidden');
});

// --- Hide / show the control panel (handy on small screens) ---
const panelEl = document.getElementById('panel');
const showPanelBtn = document.getElementById('showPanel');
document.getElementById('hidePanel').addEventListener('click', () => {
  panelEl.classList.add('hidden');
  showPanelBtn.classList.remove('hidden');
});
showPanelBtn.addEventListener('click', () => {
  panelEl.classList.remove('hidden');
  showPanelBtn.classList.add('hidden');
});

function initCompanies(d) {
  companies = d;
  companies.forEach((c, i) => { c._i = i; });   // stable index for checkmark wiring
  restoreState();
  updateCheckedCount();
  render();
  if (syncCfg) syncPull(); else setSyncStatus('Sync off — tap "Set up sync"');
}
document.getElementById('syncSetup').addEventListener('click', setupSync);

if (Array.isArray(window.COMPANIES)) {
  // Loaded via <script src="data/companies.js"> — works even on file://
  initCompanies(window.COMPANIES);
} else {
  // Fallback for older builds without companies.js
  fetch('data/companies.json')
    .then(r => r.json())
    .then(d => initCompanies(d))
    .catch(() => { document.getElementById('count').textContent =
      'Could not load company data — run build_data.py then make_js.py.'; });
}
